<!DOCTYPE html>
<!--
    Polaris Sky sub-application — hosts stellarium-web-engine (AGPLv3)
    in a separate document so its license boundary stays clear of the
    main Polaris app (MPL 2.0). Loaded via <iframe src="/sky/"> from
    the parent's SKY tab. Communicates with the parent over the
    standard window.postMessage API — see js/sky-bridge.js for the
    contract.

    SWE-1 (this commit) ships only the iframe shell + WebGL detection
    + the bridge's "ready" handshake. The engine itself lands in SWE-2.

    Source: https://github.com/Stellarium/stellarium-web-engine
    License: see LICENSE-AGPL.txt next to this file.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaris Sky</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #ccc;
            font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #stel-canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #000;
        }
        /* Centred status / fallback panel. Visible only while
           the engine is loading or when WebGL is missing. */
        #sky-status {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            pointer-events: none;
            font-size: 13px;
            color: #9aa4b2;
        }
        #sky-status .msg {
            max-width: 420px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #2a2f3a;
            border-radius: 6px;
            padding: 18px 24px;
            line-height: 1.5;
        }
        #sky-status code {
            background: rgba(255, 255, 255, 0.06);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 12px;
        }
        /* AGPL footer — required by license: source link must be
           visible to network users. Tiny so it doesn't compete with
           the sky map. */
        #sky-footer {
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            pointer-events: auto;
        }
        #sky-footer a { color: inherit; }

        /* SWE-5: target FOV overlay — ALWAYS at viewport centre.
           Bridge updates width/height in pixels via setProperty when
           the parent sends set-fov-overlays (computed from camera FOV
           ratio to current engine fov). pointer-events:none so drag
           on the canvas underneath still works. */
        #sky-target-fov {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid #ef4444;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.8),
                        inset 0 0 8px rgba(239, 68, 68, 0.4);
            pointer-events: none;
            display: none;
            border-radius: 2px;
            box-sizing: border-box;
        }
        /* Centre crosshair lines: dashed + low-alpha so they hint at
           the rectangle's centre without competing with the bright
           solid stroke around the perimeter. SVG-style dashes via a
           repeating-linear-gradient (CSS pseudo-elements don't accept
           border-style:dashed on a 1px line). */
        #sky-target-fov::before,
        #sky-target-fov::after {
            content: '';
            position: absolute;
            opacity: 0.35;
        }
        #sky-target-fov::before {
            left: 50%; top: -4px; bottom: -4px; width: 1px;
            transform: translateX(-50%);
            background: repeating-linear-gradient(
                to bottom,
                #ef4444 0,
                #ef4444 4px,
                transparent 4px,
                transparent 8px
            );
        }
        #sky-target-fov::after {
            top: 50%; left: -4px; right: -4px; height: 1px;
            transform: translateY(-50%);
            background: repeating-linear-gradient(
                to right,
                #ef4444 0,
                #ef4444 4px,
                transparent 4px,
                transparent 8px
            );
        }
        /* SWE-5: ASIAIR-style edge labels on the target rectangle.
           Mirrors the layout from the asiair screenshot the user
           provided: "Target" at bottom-left corner inside, then
           "Rotation XXX.X°" and "W° × H°" both running vertically
           along the OUTSIDE of the left edge, stacked. Text uses
           writing-mode: vertical-rl which rotates glyphs naturally
           top-to-bottom — paired with rotate(180deg) we flip to
           bottom-to-top so labels read upward as the eye usually
           expects on a side label. */
        .fov-label {
            position: absolute;
            font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
            font-size: 11px;
            font-weight: 600;
            color: #fca5a5;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
            white-space: nowrap;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
        /* "Target" — bottom-left corner, just inside the rectangle. */
        #sky-target-fov .fov-label-corner {
            left: 6px;
            bottom: 6px;
        }
        /* Rotation + size: both vertical, stacked on the outside of
           the LEFT edge. Rotation upper half, size lower half. */
        #sky-target-fov .fov-label-edge-rot,
        #sky-target-fov .fov-label-edge-size {
            left: -8px;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }
        #sky-target-fov .fov-label-edge-rot {
            bottom: 50%;
            margin-bottom: 6px;
        }
        #sky-target-fov .fov-label-edge-size {
            top: 50%;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <canvas id="stel-canvas"></canvas>
    <div id="sky-target-fov">
        <span class="fov-label fov-label-corner">Target</span>
        <span class="fov-label fov-label-edge-rot" id="sky-target-rotlabel">Rotation 0.0°</span>
        <span class="fov-label fov-label-edge-size" id="sky-target-sizelabel">0° × 0°</span>
    </div>
    <div id="sky-status"><div class="msg">Loading sky engine…</div></div>
    <div id="sky-footer">
        Powered by <a href="https://github.com/Stellarium/stellarium-web-engine"
            target="_blank" rel="noopener">stellarium-web-engine</a> · AGPLv3 ·
        <a href="https://github.com/DanWBR/NINA.Polaris" target="_blank"
            rel="noopener">source</a>
    </div>

    <!-- SWE-2: stellarium-web-engine WASM loader.
         SWE-3-bugfix: dropped the `async` attribute. Originally `async`
         so a 404 (engine not built yet) wouldn't block the page paint,
         but in practice this raced the bridge's DOMContentLoaded boot:
         StelWebEngine could still be undefined when sky-bridge.js fired
         and the bridge would bail out with the "engine missing" path,
         even though the script eventually loaded a few ms later. The
         file is only 76 KB and we ship it in-repo so a sync load is
         imperceptible. onerror still logs the clear "build me" hint
         when the file genuinely is missing.
         Once StelWebEngine is on the window, sky-bridge.js below
         picks it up at DOMContentLoaded. -->
    <script>
        // Flag the bridge can still consult — kept for backwards
        // compatibility with diagnostic snippets we've shared.
        window.__skyEngineScriptLoaded = false;
    </script>
    <script src="js/wasm/stellarium-web-engine.js"
            onload="window.__skyEngineScriptLoaded = true;"
            onerror="console.warn('[Sky] engine .js not present yet — run scripts/build-stellarium-web.sh')"></script>
    <script src="js/sky-bridge.js"></script>
</body>
</html>
