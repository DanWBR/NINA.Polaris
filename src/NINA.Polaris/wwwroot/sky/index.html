<!DOCTYPE html>
<!--
    Polaris Sky sub-application — hosts stellarium-web-engine (AGPLv3)
    in a separate document so its license boundary stays clear of the
    main Polaris app (MPL 2.0). Loaded via <iframe src="/sky/"> from
    the parent's SKY tab. Communicates with the parent over the
    standard window.postMessage API — see js/sky-bridge.js for the
    contract.

    SWE-1 (this commit) ships only the iframe shell + WebGL detection
    + the bridge's "ready" handshake. The engine itself lands in SWE-2.

    Source: https://github.com/Stellarium/stellarium-web-engine
    License: see LICENSE-AGPL.txt next to this file.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaris Sky</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #ccc;
            font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        #stel-canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #000;
        }
        /* Centred status / fallback panel. Visible only while
           the engine is loading or when WebGL is missing. */
        #sky-status {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            pointer-events: none;
            font-size: 13px;
            color: #9aa4b2;
        }
        #sky-status .msg {
            max-width: 420px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #2a2f3a;
            border-radius: 6px;
            padding: 18px 24px;
            line-height: 1.5;
        }
        #sky-status code {
            background: rgba(255, 255, 255, 0.06);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 12px;
        }
        /* AGPL footer — required by license: source link must be
           visible to network users. Tiny so it doesn't compete with
           the sky map. */
        #sky-footer {
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            pointer-events: auto;
        }
        #sky-footer a { color: inherit; }
    </style>
</head>
<body>
    <canvas id="stel-canvas"></canvas>
    <div id="sky-status"><div class="msg">Loading sky engine…</div></div>
    <div id="sky-footer">
        Powered by <a href="https://github.com/Stellarium/stellarium-web-engine"
            target="_blank" rel="noopener">stellarium-web-engine</a> · AGPLv3 ·
        <a href="https://github.com/DanWBR/NINA.Polaris" target="_blank"
            rel="noopener">source</a>
    </div>

    <!-- SWE-2: stellarium-web-engine WASM loader. Marked async +
         given an explicit onerror so the bridge can fall through to
         "engine missing — run scripts/build-stellarium-web.sh"
         status when the file hasn't been built into js/wasm/ yet.
         Once StelWebEngine is on the window, sky-bridge.js below
         calls it from its load handler. -->
    <script>
        // Flag the bridge will check. Flips to true if the engine
        // .js loads successfully; stays false on 404 (uncommitted
        // build) so the bridge shows a clear message.
        window.__skyEngineScriptLoaded = false;
    </script>
    <script src="js/wasm/stellarium-web-engine.js" async
            onload="window.__skyEngineScriptLoaded = true;"
            onerror="console.warn('[Sky] engine .js not present yet — run scripts/build-stellarium-web.sh')"></script>
    <script src="js/sky-bridge.js"></script>
</body>
</html>
